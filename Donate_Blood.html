 <style>
body {
  font-family: "Lato", sans-serif;
}

/* Fixed sidenav, full height */
.sidenav {
  height: 100%;
  width: 200px;
  position: fixed;
  z-index: 1;
  top: 0;
  left: 0;
  background-color: #111;
  overflow-x: hidden;
  padding-top: 20px;
}

/* Style the sidenav links and the dropdown button */
.sidenav a, .dropdown-btn {
  padding: 6px 8px 6px 16px;
  text-decoration: none;
  font-size: 20px;
  color: #818181;
  display: block;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  cursor: pointer;
  outline: none;
}

/* On mouse-over */
.sidenav a:hover, .dropdown-btn:hover {
  color: #f1f1f1;
}

/* Main content */
.main {
  margin-left: 200px; /* Same as the width of the sidenav */
  margin-bottom: 60px;
  font-size: 20px; /* Increased text to enable scrolling */
  padding: 0px 10px;
}

/* Add an active class to the active dropdown button */
.active {
  
  color: white;
}

/* Dropdown container (hidden by default). Optional: add a lighter background color and some left padding to change the design of the dropdown content */
.dropdown-container {
  display: none;
  background-color: #262626;
  padding-left: 8px;
}

/* Optional: Style the caret down icon */
.fa-caret-down {
  float: right;
  padding-right: 8px;
}

/* Some media queries for responsiveness */
@media screen and (max-height: 450px) {
  .sidenav {padding-top: 15px;}
  .sidenav a {font-size: 18px;}
}

  #scrollToTopBtn {
          background-color: black;
          border: none;
          border-radius: 50%;
          color: white;
          cursor: pointer;
          font-size: 16px;
          line-height: 48px;
          width: 48px
        }

         @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

 * {
     margin: 0;
     padding: 0;
     box-sizing: border-box;
     font-family: 'Poppins', sans-serif
 }


 body::-webkit-scrollbar {
     display: none
 }

 .wrapper {
     max-width: 800px;
     margin: 80px auto;
     padding: 30px 45px;
     box-shadow: 5px 25px 35px #3535356b
 }

 .wrapper label {
     display: block;
     padding-bottom: 0.2rem
 }

 .wrapper .form .row {
     padding: 0.6rem 0
 }

 .wrapper .form .row .form-control {
     box-shadow: none
 }

 .wrapper .form .option {
     position: relative;
     padding-left: 20px;
     cursor: pointer
 }

 .wrapper .form .option input {
     opacity: 0
 }

 .wrapper .form .checkmark {
     position: absolute;
     top: 1px;
     left: 0;
     height: 20px;
     width: 20px;
     border: 1px solid #bbb;
     border-radius: 50%
 }

 .wrapper .form .option input:checked~.checkmark:after {
     display: block
 }

 .wrapper .form .option:hover .checkmark {
     background: #f3f3f3
 }

 .wrapper .form .option .checkmark:after {
     content: "";
     width: 10px;
     height: 10px;
     display: block;
     background: linear-gradient(45deg, #ce1e53, #8f00c7);
     position: absolute;
     top: 50%;
     left: 50%;
     border-radius: 50%;
     transform: translate(-50%, -50%) scale(0);
     transition: 300ms ease-in-out 0s
 }

 .wrapper .form .option input[type="radio"]:checked~.checkmark {
     background: #fff;
     transition: 300ms ease-in-out 0s
 }

 .wrapper .form .option input[type="radio"]:checked~.checkmark:after {
     transform: translate(-50%, -50%) scale(1)
 }

 #sub {
     display: block;
     width: 100%;
     border: 1px solid #ddd;
     padding: 10px;
     border-radius: 5px;
     color: #333
 }

 #sub:focus {
     outline: none
 }

 @media(max-width: 768.5px) {
     .wrapper {
         margin: 30px
     }

     .wrapper .form .row {
         padding: 0
     }
 }

 @media(max-width: 400px) {
     .wrapper {
         padding: 25px;
         margin: 20px
     }
 }
</style>

  <div class="main">
  <div class="container">
   
   <div class="wrapper rounded bg-white">
    <div class="h3">Donate Blood</div>
    <div class="form">
        <div class="row">
            <div class="col-md-6 mt-md-0 mt-3"> <label>Name</label> <input type="text" class="form-control" required> </div>
            
        </div>
        <div class="row">
            <div class="col-md-6 mt-md-0 mt-3"> <label>Birthday</label> <input type="date" class="form-control" required> </div>
            
            <div class="col-md-6 mt-md-0 mt-3"> <label>Gender</label>
                <div class="d-flex align-items-center mt-2"> <label class="option"> <input type="radio" name="radio">Male <span class="checkmark"></span> </label> <label class="option ms-4"> <input type="radio" name="radio">Female <span class="checkmark"></span> </label>  <label class="option ms-4"> <input type="radio" name="radio">Other <span class="checkmark"></span> </label> </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 mt-md-0 mt-3"> <label>Email</label> <input type="email" class="form-control" required> </div>
            <div class="col-md-6 mt-md-0 mt-3"> <label>Phone Number</label> <input type="tel" class="form-control" required> </div>
        </div>
        <div class=" my-md-2 my-3"> <label>Blood Type</label> <select id="sub" required>
                <option value="" selected hidden>Choose Option</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
            </select> </div>

            <div class="row">
            <div class="col-md-6 mt-md-0 mt-3"> <label>Home Address 1</label> <input type="text" class="form-control" required> </div>
            <div class="col-md-6 mt-md-0 mt-3"> <label>Home Address 2 (Optional)</label> <input type="text" class="form-control" > </div>
            <div class="col-md-6 mt-md-0 mt-3"> <label>Country</label> <input type="text" class="form-control" required> </div>
            <div class="col-md-6 mt-md-0 mt-3"> <label>City</label> <input type="text" class="form-control" required> </div>
            <div class="col-md-6 mt-md-0 mt-3"> <label>Region</label> <input type="text" class="form-control" required> </div>
            <div class="col-md-6 mt-md-0 mt-3"> <label>Zip Code</label> <input type="text" class="form-control" required> </div>
        </div>

        <div class="col-md-6 mt-md-0 mt-3"> <label>Did you ever donate blood before?</label>
                <div class="d-flex align-items-center mt-2"> <label class="option"> <input type="radio" name="radio">Yes <span class="checkmark"></span> </label> <label class="option ms-4"> <input type="radio" name="radio">No <span class="checkmark"></span> </label>  </div>
            </div>

            <hr>

            <div class="col-md-6 mt-md-0 mt-3"> <label>Do you suffer of any diseases?</label>
                <div class="d-flex align-items-center mt-2"> <label class="option"> <input type="radio" name="radio">Yes <span class="checkmark"></span> </label> <label class="option ms-4"> <input type="radio" name="radio">No <span class="checkmark"></span> </label>  </div>
            </div>

             <div class="col-md-6 mt-md-0 mt-3"> <label>Do you have allergies?</label>
                <div class="d-flex align-items-center mt-2"> <label class="option"> <input type="radio" name="radio">Yes <span class="checkmark"></span> </label> <label class="option ms-4"> <input type="radio" name="radio">No <span class="checkmark"></span> </label>  </div>
            </div>

            <div class="row">
            <div class="col-md-6 mt-md-0 mt-3"> <label>Other allergies (if any):</label> <input type="text" class="form-control"> </div></div>

             <div class="col-md-6 mt-md-0 mt-3"> <label>Have you ever had positive Blood test for HbsAg, Hcv, HIV?</label>
                <div class="d-flex align-items-center mt-2"> <label class="option"> <input type="radio" name="radio">Yes <span class="checkmark"></span> </label> <label class="option ms-4"> <input type="radio" name="radio">No <span class="checkmark"></span> </label>  </div>
            </div>

             <div class="col-md-6 mt-md-0 mt-3"> <label>Do you have any cardiac problems?</label>
                <div class="d-flex align-items-center mt-2"> <label class="option"> <input type="radio" name="radio">Yes <span class="checkmark"></span> </label> <label class="option ms-4"> <input type="radio" name="radio">No <span class="checkmark"></span> </label>  </div>
            </div>


             <div class="col-md-6 mt-md-0 mt-3"> <label>Do you suffer any bleeding disorders?</label>
                <div class="d-flex align-items-center mt-2"> <label class="option"> <input type="radio" name="radio">Yes <span class="checkmark"></span> </label> <label class="option ms-4"> <input type="radio" name="radio">No <span class="checkmark"></span> </label>  </div>
            </div>

        <div class="btn btn-primary mt-3">Submit</div>

    </div>
</div>

    <script>
      var scrollToTopBtn = document.getElementById("scrollToTopBtn")
      var rootElement = document.documentElement

      function scrollToTop() {
        // Scroll to top logic
        rootElement.scrollTo({
          top: 0,
          behavior: "smooth"
        })
      }
      scrollToTopBtn.addEventListener("click", scrollToTop)

//DropDown Button
      var dropdown = document.getElementsByClassName("dropdown-btn");
var i;

for (i = 0; i < dropdown.length; i++) {
  dropdown[i].addEventListener("click", function() {
  this.classList.toggle("active");
  var dropdownContent = this.nextElementSibling;
  if (dropdownContent.style.display === "block") {
  dropdownContent.style.display = "none";
  } else {
  dropdownContent.style.display = "block";
  }
  });
}
    </script>
